<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Support Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2>Conversations</h2>

        <ul>
            <li>Order Issue</li>
            <li>Refund Request</li>
            <li>Login Problem</li>
            <li>Payment Failed</li>
        </ul>

    </aside>

    <!-- Chat Area -->
    <main class="chat">

        <div class="memory-badge">
            <span class="dot"></span>
            Memory Active
        </div>

        <div class="messages">

            <div class="message agent">
                Hello! How can I assist you today?
            </div>

            <div class="message user">
                I need help with my order.
            </div>

        </div>

        <!-- Input -->
        <div class="input-bar">

            <input type="text" placeholder="Type your message..." />

            <button>Send</button>

        </div>

    </main>

</div>

</body>
</html>
