<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Support Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Conversations</h2>
        <ul>
            <li>Order Issue</li>
            <li>Refund Request</li>
            <li>Login Problem</li>
            <li>Payment Failed</li>
        </ul>
    </aside>

    <!-- Chat Area -->
    <main class="chat">

        <div class="memory-badge">
            <span class="dot"></span>
            Memory Active
        </div>

        <!-- chat-box id added so script.js can find it -->
        <div class="messages" id="chat-box">
            <div class="message agent">
                Hello! How can I assist you today?
            </div>
        </div>

        <!-- Input -->
        <div class="input-bar">
            <!-- id added so script.js can read the value -->
            <input
                type="text"
                id="message-input"
                placeholder="Type your message..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <!-- onclick added to trigger sendMessage() -->
            <button onclick="sendMessage()">Send</button>
        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
