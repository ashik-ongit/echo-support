<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Support Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Conversations</h2>
        <ul>
            <li>Order Issue</li>
            <li>Refund Request</li>
            <li>Login Problem</li>
            <li>Payment Failed</li>
        </ul>
    </aside>

    <!-- Chat Area -->
    <main class="chat">

        <div class="memory-badge">
            <span class="dot"></span>
            Memory Active
        </div>

        <div class="messages" id="chat-box">
            <div class="message agent">
                Hello! How can I assist you today?
            </div>
        </div>

        <!-- Input -->
        <div class="input-bar">
            <input
                type="text"
                id="message-input"
                placeholder="Type your message..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button onclick="sendMessage()">Send</button>
        </div>

    </main>

    <!-- Memory Panel -->
    <aside class="memory-panel">
        <div class="memory-panel-header">
            <span class="dot"></span>
            <h3>🧠 Agent Memory</h3>
            <span id="memory-count"></span>
        </div>
        <div id="memory-list">
            <p class="memory-empty">No memories yet. Start chatting!</p>
        </div>
    </aside>

</div>

<script src="script.js"></script>
</body>
</html>
